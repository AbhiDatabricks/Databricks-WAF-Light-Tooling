  sql: "--ToDo: Use account_prices system table when available\n\nselect \n\n--t1.usage_date,\n\ncase when t1.sku_name like '%SERVERLESS_SQL%' then 'SQL_SERVERLESS' \n\nwhen t1.sku_name like '%ENTERPRISE_SQL_COMPUTE%' then 'SQL_CLASSIC'\n\nwhen t1.sku_name like '%SQL_PRO%' then 'SQL_PRO'\n\nelse 'Other' end as sql_sku_name,\n\nSUM(t1.usage_quantity * list_prices.pricing.default) as list_cost\n\nFROM system.billing.usage t1\n\nINNER JOIN system.billing.list_prices on\n\n   t1.cloud = list_prices.cloud and\n\n   t1.sku_name = list_prices.sku_name and\n\n   t1.usage_start_time >= list_prices.price_start_time and\n\n   (t1.usage_end_time <= list_prices.price_end_time or list_prices.price_end_time is null)\n\nwhere t1.sku_name like '%SQL%' and t1.usage_date >= current_date() - interval 30 days\n\ngroup by all"
