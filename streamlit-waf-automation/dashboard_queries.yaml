- name: c3adf755
  display_name: waf_controls_p
  sql: "WITH serverless_usage AS (\n\n  SELECT \n\n    COUNT(*) as total_compute,\n\n    SUM(CASE WHEN usage_type LIKE '%SERVERLESS%' OR sku_name LIKE '%SERVERLESS%' THEN 1 ELSE 0 END) as serverless_count\n\n  FROM system.billing.usage\n\n  WHERE usage_start_time >= CURRENT_DATE - INTERVAL '30' DAY\n\n    AND usage_type LIKE '%COMPUTE%'\n\n),\n\nphoton_usage AS (\n\n  SELECT \n\n    COUNT(*) as total_compute,\n\n    SUM(CASE WHEN product_features.is_photon = true THEN 1 ELSE 0 END) as photon_compute\n\n  FROM system.billing.usage\n\n  WHERE usage_start_time >= CURRENT_DATE - INTERVAL '30' DAY\n\n    AND usage_type LIKE '%COMPUTE%'\n\n),\n\ncluster_workers AS (\n\n  SELECT \n\n    COUNT(*) as total_clusters,\n\n    SUM(CASE WHEN worker_count > 1 THEN 1 ELSE 0 END) as clusters_multi_worker,\n\n    SUM(CASE WHEN worker_count > 3 THEN 1 ELSE 0 END) as clusters_large\n\n  FROM system.compute.clusters\n\n),\n\ninstance_variety AS (\n\n  SELECT \n\n    COUNT(*) as total_clusters,\n\n    COUNT(DISTINCT split(worker_node_type,'[.]')[0]) as distinct_families\n\n  FROM system.compute.clusters\n\n),\n\nwaf_status AS (\n\n  SELECT\n\n    waf_id,\n\n    principle,\n\n    best_practice,\n\n    CASE \n\n    WHEN waf_id = 'PE-01-01' THEN (\n\n      SELECT CASE WHEN total_compute > 0 THEN (serverless_count * 100.0 / total_compute) ELSE 0 END FROM serverless_usage\n\n    )\n\n    WHEN waf_id = 'PE-01-02' THEN (\n\n      CASE WHEN EXISTS (SELECT 1 FROM system.billing.usage WHERE sku_name LIKE '%SERVERLESS_REAL_TIME_INFERENCE%' LIMIT 1) THEN 100 ELSE 0 END\n\n    )\n\n    WHEN waf_id = 'PE-02-02' THEN (\n\n      SELECT CASE WHEN total_clusters > 0 THEN (clusters_multi_worker * 100.0 / total_clusters) ELSE 0 END FROM cluster_workers\n\n    )\n\n    WHEN waf_id = 'PE-02-04' THEN (\n\n      SELECT CASE WHEN total_clusters > 0 THEN (clusters_large * 100.0 / total_clusters) ELSE 0 END FROM cluster_workers\n\n    )\n\n    WHEN waf_id = 'PE-02-05' THEN (\n\n      CASE WHEN NOT EXISTS (SELECT 1 FROM system.information_schema.routines WHERE external_language = 'Python' LIMIT 1) THEN 100 ELSE 0 END\n\n    )\n\n    WHEN waf_id = 'PE-02-06' THEN (\n\n      SELECT CASE WHEN total_compute > 0 THEN (photon_compute * 100.0 / total_compute) ELSE 0 END FROM photon_usage\n\n    )\n\n    WHEN waf_id = 'PE-02-07' THEN (\n\n      SELECT CASE WHEN total_clusters > 0 THEN (distinct_families * 100.0 / total_clusters) ELSE 0 END FROM instance_variety\n\n    )\n\n    ELSE 0\n\n    END AS current_percentage,\n\n    CASE \n\n    WHEN waf_id = 'PE-01-01' AND (\n\n      SELECT CASE WHEN total_compute > 0 THEN (serverless_count * 100.0 / total_compute) ELSE 0 END FROM serverless_usage\n\n    ) >= 50 THEN 'Yes'\n\n    WHEN waf_id = 'PE-01-02' AND EXISTS (\n\n      SELECT 1 FROM system.billing.usage WHERE sku_name LIKE '%SERVERLESS_REAL_TIME_INFERENCE%' LIMIT 1\n\n    ) THEN 'Yes'\n\n    WHEN waf_id = 'PE-02-02' AND (\n\n      SELECT CASE WHEN total_clusters > 0 THEN (clusters_multi_worker * 100.0 / total_clusters) ELSE 0 END FROM cluster_workers\n\n    ) >= 80 THEN 'Yes'\n\n    WHEN waf_id = 'PE-02-04' AND (\n\n      SELECT CASE WHEN total_clusters > 0 THEN (clusters_large * 100.0 / total_clusters) ELSE 0 END FROM cluster_workers\n\n    ) >= 50 THEN 'Yes'\n\n    WHEN waf_id = 'PE-02-05' AND NOT EXISTS (\n\n      SELECT 1 FROM system.information_schema.routines WHERE external_language = 'Python' LIMIT 1\n\n    ) THEN 'Yes'\n\n    WHEN waf_id = 'PE-02-06' AND (\n\n      SELECT CASE WHEN total_compute > 0 THEN (photon_compute * 100.0 / total_compute) ELSE 0 END FROM photon_usage\n\n    ) >= 80 THEN 'Yes'\n\n    WHEN waf_id = 'PE-02-07' AND (\n\n      SELECT CASE WHEN total_clusters > 0 THEN (distinct_families * 100.0 / total_clusters) ELSE 0 END FROM instance_variety\n\n    ) >= 5 THEN 'Yes'\n\n    ELSE 'No'\n\n    END AS implemented\n\n  FROM (\n\n    SELECT * FROM VALUES\n\n    ('PE-01-01', 'Utilize serverless capabilities', 'Use serverless architecture'),\n\n    ('PE-01-02', 'Utilize serverless capabilities', 'Use an enterprise grade model serving service'),\n\n    ('PE-02-02', 'Design workloads for performance', 'Use parallel computation where it is beneficial'),\n\n    ('PE-02-04', 'Design workloads for performance', 'Prefer larger clusters'),\n\n    ('PE-02-05', 'Design workloads for performance', 'Use native Spark operations'),\n\n    ('PE-02-06', 'Design workloads for performance', 'Use native platform engines'),\n\n    ('PE-02-07', 'Design workloads for performance', 'Understand your hardware and workload type')\n\n    AS waf(waf_id, principle, best_practice)\n\n  )\n\n)\n\nSELECT\n\n  waf_id,\n\n  principle,\n\n  best_practice,\n\n  ROUND(current_percentage, 1) as score_percentage,\n\n  CASE \n\n  WHEN waf_id = 'PE-01-01' THEN 50\n\n  WHEN waf_id = 'PE-01-02' THEN 100\n\n  WHEN waf_id = 'PE-02-02' THEN 80\n\n  WHEN waf_id = 'PE-02-04' THEN 50\n\n  WHEN waf_id = 'PE-02-05' THEN 100\n\n  WHEN waf_id = 'PE-02-06' THEN 80\n\n  WHEN waf_id = 'PE-02-07' THEN 5\n\n  END as threshold_percentage,\n\n  CASE \n\n  WHEN implemented = 'Yes' THEN 'Met'\n\n  ELSE 'Not Met'\n\n  END as threshold_met,\n\n  implemented\n\nFROM waf_status\n\nORDER BY principle, waf_id;\n"
  parameters: []
  pillar: performance_efficiency
  table_name: waf_controls_p
  is_coming_soon: false
  is_control_query: true
- name: 1327fa8d
  display_name: PE-01_01_PE_02_dbu_usage
  sql: "WITH PE_01 AS (\n\nSELECT \n\n    billing_origin_product\n\n  , SUM(runs) AS runs_total\n\n  , SUM(dbu_usage) AS dbu_usage_total\n\n  , CASE WHEN is_serverless = true THEN 'SERVERLESS' ELSE 'CLASSIC' END AS classic_or_serverless\n\n  , CASE WHEN is_photon = true THEN 'PHOTON' ELSE 'NON-PHOTON' END AS photon_or_non_photon\n\n  , CASE WHEN performance_target = 'COST_OPTIMIZED' THEN 'STANDARD' ELSE performance_target END AS performance_target\n\n  , CASE WHEN product_tier is null and classic_or_serverless = 'SERVERLESS' THEN 'SERVERLESS' ELSE product_tier END AS product_tier\n\n  , unique_id\n\n  , compute_id\n\n  , instance_pool_id\n\n  , workspace_id\n\n  , CASE WHEN instance_pool_id is null THEN 'NO' ELSE 'YES' END AS instance_pool_present\n\n  , 'PE_01' AS waf_id\n\n  , 'Detailed' AS dataset_type\n\n  \n\nFROM \n\n(SELECT \n\n   COUNT(*) AS runs\n\n  ,SUM(usage_quantity) AS dbu_usage, \n\n   CASE WHEN billing_origin_product = 'ALL_PURPOSE' THEN 'INTERACTIVE' \n\n        WHEN billing_origin_product = 'DATABASE' THEN 'LAKEBASE' \n\n        WHEN billing_origin_product = 'DLT' THEN 'SDP'\n\n        ELSE billing_origin_product END AS billing_origin_product\n\n  ,CASE WHEN sku_name LIKE '%SERVERLESS%' OR product_features.is_serverless = true THEN true ELSE false END AS is_serverless\n\n  ,CASE WHEN sku_name LIKE '%PHOTON%' OR product_features.is_photon = true THEN true ELSE false END AS is_photon\n\n  ,CASE WHEN product_features.performance_target IS NULL THEN 'UNDEFINED' ELSE product_features.performance_target END AS performance_target\n\n  ,coalesce(product_features.jobs_tier,product_features.sql_tier,product_features.dlt_tier) AS product_tier\n\n  ,coalesce(usage_metadata.job_id,usage_metadata.dlt_pipeline_id) AS unique_id\n\n  ,coalesce(usage_metadata.cluster_id,usage_metadata.warehouse_id) AS compute_id\n\n  ,usage_metadata.instance_pool_id AS instance_pool_id\n\n  ,workspace_id\n\n FROM system.billing.usage \n\n WHERE usage_date BETWEEN current_date() - INTERVAL 90 DAY  AND current_date()\n\n AND --array_contains(:workspace_id,workspace_id) AND \n\n usage_unit = 'DBU'\n\n AND billing_origin_product IN ('LAKEFLOW_CONNECT','DATA_QUALITY_MONITORING','PREDICTIVE_OPTIMIZATION','DATABASE','APPS','VECTOR_SEARCH','JOBS','MODEL_SERVING','LAKEFLOW_CONNECT','SQL','INTERACTIVE','DLT','ALL_PURPOSE')\n\n GROUP BY CASE WHEN billing_origin_product = 'ALL_PURPOSE' THEN 'INTERACTIVE' \n\n               WHEN billing_origin_product = 'DATABASE' THEN 'LAKEBASE'  \n\n              WHEN billing_origin_product = 'DLT' THEN 'SDP'\n\n          ELSE billing_origin_product END\n\n          , workspace_id\n\n          , CASE WHEN sku_name LIKE '%SERVERLESS%' OR product_features.is_serverless = true THEN true ELSE false END\n\n          ,CASE WHEN sku_name LIKE '%PHOTON%' OR product_features.is_photon = true THEN true ELSE false END\n\n          ,CASE WHEN product_features.performance_target IS NULL THEN 'UNDEFINED' ELSE product_features.performance_target END\n\n          ,coalesce(product_features.jobs_tier,product_features.sql_tier,product_features.dlt_tier)\n\n          ,coalesce(usage_metadata.job_id,usage_metadata.dlt_pipeline_id)\n\n          ,coalesce(usage_metadata.cluster_id,usage_metadata.warehouse_id)\n\n          ,usage_metadata.instance_pool_id \n\n)CTE\n\nGROUP BY\n\nbilling_origin_product,workspace_id,is_serverless,is_photon,performance_target,product_tier,unique_id,compute_id,instance_pool_id\n\n),\n\ncompute_met AS (\n\n  SELECT * FROM \n\n    (select  row_number() over(partition by account_id, workspace_id, cluster_id order by change_time desc) AS rn\n\n        , account_id\n\n        , workspace_id\n\n        , c.cluster_id\n\n        , c.cluster_name\n\n        , c.worker_node_type\n\n        , worker_count\n\n        , max_autoscale_workers\n\n        , min_autoscale_workers\n\n        , CASE WHEN auto_termination_minutes IS NULL THEN 0 ELSE 1 END AS is_auto_terminated\n\n        , cluster_source\n\n        \n\n    from system.compute.clusters c \n\n    WHERE --array_contains(:workspace_id,workspace_id)\n\n     change_date <= current_date()) --TBD to check this filter\n\n    WHERE rn = 1\n\n)\n\nSELECT\n\n  waf_id,\n\n  dataset_type,\n\n  billing_origin_product,\n\n  CASE WHEN ifnull(CM.min_autoscale_workers,0) = ifnull(CM.max_autoscale_workers,0) THEN 0 ELSE 1 END AS is_autoscaling,\n\n  worker_count,\n\n  usage.workspace_id,\n\n  runs_total,\n\n  dbu_usage_total, \n\n  classic_or_serverless,\n\n  photon_or_non_photon,\n\n  performance_target,\n\n  product_tier,\n\n  unique_id,\n\n  compute_id,\n\n  cluster_source,\n\n  instance_pool_id,\n\n  instance_pool_present\n\nFROM PE_01 usage\n\nLEFT JOIN\n\ncompute_met CM\n\nON CM.cluster_id = usage.compute_id\n\nAND CM.workspace_id = usage.workspace_id\n\nORDER BY dbu_usage_total DESC\n"
  parameters:
  - workspace_id
  pillar: cost_optimisation
  table_name: waf_pe_01_01_pe_02_dbu_usage
  is_coming_soon: false
- name: 6576f362
  display_name: PE-01-02_R-01-05_serving_usage
  sql: "SELECT \n\n    AVG(input_token_count) AS avg_input_token\n\n  , AVG(output_token_count) AS avg_output_token\n\n  , COUNT(1) AS number_requests\n\n  , eu.workspace_id\n\n  , se.entity_type\n\n  , se.entity_name\n\n  , se.custom_model_config.min_concurrency AS custom_model_min_concurrency\n\n  , se.custom_model_config.max_concurrency AS custom_model_max_concurrency\n\n  , se.custom_model_config.compute_type AS custom_model_compute_type\n\n  , CASE WHEN se.entity_type = 'CUSTOM_MODEL' THEN se.endpoint_name ELSE '' END AS endpoint_name \n\n  , SUM(bu.dbu) AS dbu\n\n FROM system.serving.endpoint_usage eu\n\nINNER JOIN system.serving.served_entities se\n\nON eu.served_entity_id = se.served_entity_id\n\nLEFT JOIN \n\n(SELECT \n\n    SUM(usage_quantity) AS dbu\n\n  ,  workspace_id\n\n  , usage_metadata.endpoint_id As endpoint_id\n\nFROM system.billing.usage\n\nWHERE billing_origin_product = 'MODEL_SERVING'\n\nAND usage_date BETWEEN current_date() - INTERVAL 90 DAY  AND current_date()\n\n--AND array_contains(:workspace_id,workspace_id)\n\nAND usage_metadata.endpoint_id IS NOT NULL \n\nAND usage_unit = 'DBU'\n\nGROUP BY\n\n    workspace_id\n\n  , usage_metadata.endpoint_id\n\n)bu\n\nON    eu.workspace_id = bu.workspace_id \n\n  AND se.endpoint_id = bu.endpoint_id\n\nWHERE request_time BETWEEN current_date() - INTERVAL 90 DAY  AND current_date()\n\n--AND array_contains(:workspace_id,eu.workspace_id)\n\nAND eu.status_code = 200\n\nAND entity_type IN ('FOUNDATION_MODEL','CUSTOM_MODEL')\n\nGROUP BY \n\n    eu.workspace_id\n\n  , se.entity_type\n\n  , se.entity_name\n\n  , se.custom_model_config.min_concurrency\n\n  , se.custom_model_config.max_concurrency\n\n  , se.custom_model_config.compute_type\n\n  , CASE WHEN se.entity_type = 'CUSTOM_MODEL' THEN se.endpoint_name ELSE '' END\n\n\n\nORDER BY dbu DESC\n\n\n"
  parameters:
  - workspace_id
  pillar: performance_efficiency
  table_name: waf_pe_01_02_r_01_05_serving_usage
  is_coming_soon: false
- name: c3a6d1af
