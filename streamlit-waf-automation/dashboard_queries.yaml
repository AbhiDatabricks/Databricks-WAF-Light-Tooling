- name: 07c3451a
  display_name: waf_CO-02-02_warehouse_auto_termination 1
  sql: "SELECT\n\n    warehouse_id,\n\n    warehouse_name,\n\n    warehouse_type,\n\n    warehouse_size,\n\n    case when auto_stop_minutes is not null then 'Yes' else 'No' end as autotermination_enabled\n\nFROM\n\n    system.compute.warehouses\n\nQUALIFY\n\n    ROW_NUMBER() OVER (PARTITION BY account_id, workspace_id, warehouse_id ORDER BY change_time DESC) = 1\n\n    and delete_time is null\n\n--  AND array_contains(:workspace_id,workspace_id)\n"
  parameters:
