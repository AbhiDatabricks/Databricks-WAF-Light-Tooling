- name: a92ace17
  display_name: Count of Unused Tables
  sql: "SELECT \n\n  COUNT(DISTINCT CONCAT(ist.table_catalog, '.', ist.table_schema, '.', ist.table_name)) AS full_name_count\n\nFROM \n\n  system.information_schema.tables ist\n\n  LEFT JOIN \n\n    (SELECT \n\n       tl.source_table_catalog,\n\n       tl.source_table_schema,\n\n       tl.source_table_name\n\n     FROM \n\n       system.access.table_lineage tl\n\n     WHERE \n\n       tl.event_time BETWEEN :date_range_start AND :date_range_end\n\n       AND tl.source_type IN ('TABLE', 'STREAMING_TABLE')\n\n    ) tl\n\n    ON \n\n      tl.source_table_catalog = ist.table_catalog \n\n      AND tl.source_table_schema = ist.table_schema \n\n      AND tl.source_table_name = ist.table_name\n\nWHERE\n\n  tl.source_table_catalog IS NULL;"
  parameters:
  - date_range_end
  - date_range_start
  pillar: governance
  table_name: waf_count_of_unused_tables
  is_coming_soon: false
- name: 55e66413
  display_name: Count of Tables with Usage
  sql: "SELECT \n\n  COUNT(DISTINCT CONCAT(source_table_catalog, '.', source_table_schema, '.', source_table_name)) AS distinct_tables\n\nFROM \n\n  system.access.table_lineage\n\nWHERE \n\n  event_time BETWEEN :date_range_start AND :date_range_end\n\n  AND source_table_full_name IS NOT NULL\n\n  AND source_type IN ('TABLE', 'STREAMING_TABLE');"
  parameters:
  - date_range_end
  - date_range_start
  pillar: governance
  table_name: waf_count_of_tables_with_usage
  is_coming_soon: false
- name: 90d7e6f1
  display_name: Count of Unique Users with Table Read/Write Event
  sql: "SELECT \n\n  COUNT(DISTINCT created_by) AS distinct_users\n\n\n\nFROM \n\n  system.access.table_lineage AS tl\n\n\n\nWHERE \n\n  event_time >= :date_range_start\n\n  AND event_time <= :date_range_end\n\n  AND (source_table_full_name IS NOT NULL);"
  parameters:
  - date_range_end
  - date_range_start
  pillar: governance
  table_name: waf_count_of_unique_users_with_table_read_write_event
  is_coming_soon: false
- name: 628c2773
  display_name: Count of Unsecured Tables
  sql: "SELECT \n\n    COUNT(DISTINCT CONCAT(TABLE_CATALOG, '.', TABLE_SCHEMA, '.', TABLE_NAME)) AS full_name_count\n\nFROM \n\n    system.information_schema.table_privileges\n\nWHERE \n\n    grantee = 'account users' \n\n    AND privilege_type = 'SELECT';"
  parameters: []
  pillar: governance
  table_name: waf_count_of_unsecured_tables
  is_coming_soon: false
- name: 1f951287
  display_name: Count of Sensitive Tables
  sql: "SELECT COUNT(DISTINCT CONCAT(table_catalog, '.', table_schema, '.', table_name)) AS distinct_table_count\n\nFROM (\n\n    SELECT \n\n        table_catalog, table_schema, table_name\n\n    FROM \n\n        system.information_schema.column_masks\n\n\n\n    UNION\n\n\n\n    SELECT \n\n        table_catalog, table_schema, table_name\n\n    FROM \n\n        system.information_schema.row_filters\n\n) AS combined;\n"
  parameters: []
  pillar: governance
  table_name: waf_count_of_sensitive_tables
  is_coming_soon: false
- name: 913b3827
  display_name: Pie Chart of Tagged vs. Untagged Tables
  sql: "WITH tagged_count AS (\n\n    SELECT COUNT(*) AS count FROM system.information_schema.table_tags\n\n)\n\nSELECT 'Tagged' AS label, count \n\nFROM tagged_count\n\nUNION ALL\n\nSELECT 'Untagged' AS label, \n\n       (SELECT COUNT(*) FROM system.information_schema.tables) - count \n\nFROM tagged_count;"
  parameters: []
  pillar: governance
  table_name: waf_pie_chart_of_tagged_vs_untagged_tables
  is_coming_soon: false
- name: 788914b8
  display_name: Bar Chart of Popular Tags
  sql: "SELECT \n\n  tag_name,\n\n  COUNT(*) AS usage_count\n\nFROM \n\n  system.information_schema.table_tags\n\nWHERE \n\n  tag_name IS NOT NULL\n\nGROUP BY \n\n  tag_name\n\nORDER BY \n\n  usage_count DESC\n\nLIMIT 10;"
  parameters: []
  pillar: governance
  table_name: waf_bar_chart_of_popular_tags
  is_coming_soon: false
- name: 8d97349c
  display_name: Usage Over Last Year
  sql: "SELECT \n\n    DATE_TRUNC('month', event_time) AS usage_date,\n\n    COUNT(*) AS usage_count\n\nFROM \n\n    system.access.table_lineage\n\nWHERE \n\n    (event_time >= :date_range_start AND event_time <= :date_range_end )\n\nGROUP BY \n\n    usage_date\n\nORDER BY\n\n    usage_date;"
  parameters:
  - date_range_end
  - date_range_start
  pillar: governance
  table_name: waf_usage_over_last_year
  is_coming_soon: false
- name: 763a2da9
  display_name: Most Popular Tables with Staleness
  sql: "WITH TableReads AS (\n  SELECT\n    CONCAT(source_table_catalog, '.', source_table_schema, '.', source_table_name) AS table_full_name,\n    COUNT(*) AS read_count\n  FROM system.access.table_lineage\n  WHERE source_table_catalog IS NOT NULL\n    AND :date_range_start <= event_date AND event_date <= :date_range_end\n  GROUP BY table_full_name\n),\nLatestTargetDate AS (\n  SELECT\n    CONCAT(target_table_catalog, '.', target_table_schema, '.', target_table_name) AS table_full_name,\n    MAX(event_date) AS latest_target_date\n  FROM system.access.table_lineage\n  WHERE target_table_catalog IS NOT NULL\n  GROUP BY table_full_name\n)\nSELECT\n  tr.table_full_name,\n  tr.read_count,\n  COALESCE(CAST(ltd.latest_target_date AS STRING), 'N/A') AS latest_target_date\nFROM TableReads tr\nLEFT JOIN LatestTargetDate ltd ON tr.table_full_name = ltd.table_full_name\nORDER BY tr.read_count DESC\nLIMIT 10"
  parameters:
  - date_range_end
  - date_range_start
  pillar: governance
  table_name: waf_most_popular_tables_with_staleness
  is_coming_soon: false
- name: 1eab9fe1
  display_name: waf_controls_g
  sql: "WITH delta_usage AS (\n\n  SELECT \n\n    COUNT(*) as total_tables,\n\n    SUM(CASE WHEN data_source_format IN ('DELTA', 'ICEBERG') THEN 1 ELSE 0 END) as delta_tables\n\n  FROM system.information_schema.tables\n\n  WHERE table_catalog != 'hive_metastore'\n\n),\n\nlineage_usage AS (\n\n  SELECT \n\n    COUNT(DISTINCT CONCAT(t.table_catalog, '.', t.table_schema, '.', t.table_name)) as total_tables,\n\n    COUNT(DISTINCT CASE WHEN tl.target_table_full_name IS NOT NULL THEN CONCAT(t.table_catalog, '.', t.table_schema, '.', t.table_name) END) as lineage_tables\n\n  FROM system.information_schema.tables t\n\n  LEFT JOIN system.access.table_lineage tl ON CONCAT(t.table_catalog, '.', t.table_schema, '.', t.table_name) = tl.target_table_full_name\n\n  WHERE t.table_catalog != 'hive_metastore'\n\n),\n\nmetadata_usage AS (\n\n  SELECT \n\n    COUNT(*) as total_tables,\n\n    SUM(CASE WHEN comment IS NOT NULL THEN 1 ELSE 0 END) as tables_with_comments,\n\n    CASE WHEN EXISTS (SELECT 1 FROM system.information_schema.table_tags LIMIT 1) \n\n      THEN (SELECT COUNT(*) FROM system.information_schema.tables WHERE table_catalog != 'hive_metastore')\n\n      ELSE 0 \n\n    END as tables_with_tags\n\n  FROM system.information_schema.tables t\n\n  WHERE table_catalog != 'hive_metastore'\n\n),\n\nwaf_status AS (\n\n  SELECT\n\n    waf_id,\n\n    principle,\n\n    description,\n\n    CASE \n\n    WHEN waf_id = 'DG-01-03' THEN (\n\n      SELECT CASE WHEN total_tables > 0 THEN (lineage_tables * 100.0 / total_tables) ELSE 0 END FROM lineage_usage\n\n    )\n\n    WHEN waf_id = 'DG-01-04' THEN (\n\n      SELECT CASE WHEN total_tables > 0 THEN (tables_with_comments * 100.0 / total_tables) ELSE 0 END FROM metadata_usage\n\n    )\n\n    WHEN waf_id = 'DG-01-05' THEN (\n\n      SELECT CASE WHEN total_tables > 0 THEN (tables_with_tags * 100.0 / total_tables) ELSE 0 END FROM metadata_usage\n\n    )\n\n    WHEN waf_id = 'DG-02-01' THEN (\n\n      CASE WHEN EXISTS (SELECT 1 FROM system.information_schema.row_filters LIMIT 1) THEN 100 ELSE 0 END\n\n    )\n\n    WHEN waf_id = 'DG-02-02' THEN (\n\n      CASE WHEN EXISTS (SELECT 1 FROM system.access.audit LIMIT 1) THEN 100 ELSE 0 END\n\n    )\n\n    WHEN waf_id = 'DG-02-03' THEN (\n\n      CASE WHEN EXISTS (\n\n        SELECT 1 FROM system.information_schema.tables\n\n        WHERE table_catalog = 'system' AND table_schema = 'marketplace' AND table_name = 'listing_access_events'\n\n        LIMIT 1\n\n      ) THEN 100 ELSE 0 END\n\n    )\n\n    WHEN waf_id = 'DG-03-02' THEN (\n\n      CASE WHEN EXISTS (\n\n        SELECT 1 FROM system.information_schema.tables \n\n        WHERE table_name LIKE '%_drift_metrics' OR table_name LIKE '%_profile_metrics' \n\n        LIMIT 1\n\n      ) THEN 100 ELSE 0 END\n\n    )\n\n    WHEN waf_id = 'DG-03-03' THEN (\n\n      SELECT CASE WHEN total_tables > 0 THEN (delta_tables * 100.0 / total_tables) ELSE 0 END FROM delta_usage\n\n    )\n\n    ELSE 0\n\n    END AS current_percentage,\n\n    CASE \n\n    WHEN waf_id = 'DG-01-03' AND (\n\n      SELECT CASE WHEN total_tables > 0 THEN (lineage_tables * 100.0 / total_tables) ELSE 0 END FROM lineage_usage\n\n    ) >= 50 THEN 'Yes'\n\n    WHEN waf_id = 'DG-01-04' AND (\n\n      SELECT CASE WHEN total_tables > 0 THEN (tables_with_comments * 100.0 / total_tables) ELSE 0 END FROM metadata_usage\n\n    ) >= 50 THEN 'Yes'\n\n    WHEN waf_id = 'DG-01-05' AND EXISTS (SELECT 1 FROM system.information_schema.table_tags LIMIT 1) THEN 'Yes'\n\n    WHEN waf_id = 'DG-02-01' AND EXISTS (SELECT 1 FROM system.information_schema.row_filters LIMIT 1) THEN 'Yes'\n\n    WHEN waf_id = 'DG-02-02' AND EXISTS (SELECT 1 FROM system.access.audit LIMIT 1) THEN 'Yes'\n\n    WHEN waf_id = 'DG-02-03' AND EXISTS (\n\n      SELECT 1 FROM system.information_schema.tables\n\n      WHERE table_catalog = 'system' AND table_schema = 'marketplace' AND table_name = 'listing_access_events'\n\n      LIMIT 1\n\n    ) THEN 'Yes'\n\n    WHEN waf_id = 'DG-03-02' AND EXISTS (\n\n      SELECT 1 FROM system.information_schema.tables \n\n      WHERE table_name LIKE '%_drift_metrics' OR table_name LIKE '%_profile_metrics' \n\n      LIMIT 1\n\n    ) THEN 'Yes'\n\n    WHEN waf_id = 'DG-03-03' AND (\n\n      SELECT CASE WHEN total_tables > 0 THEN (delta_tables * 100.0 / total_tables) ELSE 0 END FROM delta_usage\n\n    ) >= 80 THEN 'Yes'\n\n    ELSE 'No'\n\n    END AS implemented\n\n  FROM (\n\n    SELECT * FROM VALUES\n\n    ('DG-01-03', 'Unify data and AI management', 'Track data and AI lineage'),\n\n    ('DG-01-04', 'Unify data and AI management', 'Add comments to metadata'),\n\n    ('DG-01-05', 'Unify data and AI management', 'Enable easy data discovery'),\n\n    ('DG-02-01', 'Unify data and AI security', 'Centralize access control (row/column level)'),\n\n    ('DG-02-02', 'Unify data and AI security', 'Configure audit logging'),\n\n    ('DG-02-03', 'Unify data and AI security', 'Audit data platform events'),\n\n    ('DG-03-02', 'Establish data quality standards', 'Use data quality tools and profiling'),\n\n    ('DG-03-03', 'Establish data quality standards', 'Enforce standardized data formats')\n\n    AS waf(waf_id, principle, description)\n\n  )\n\n)\n\nSELECT\n\n  waf_id,\n\n  principle,\n\n  description,\n\n  ROUND(current_percentage, 1) as score_percentage,\n\n  CASE \n\n  WHEN waf_id = 'DG-01-03' THEN 50\n\n  WHEN waf_id = 'DG-01-04' THEN 50\n\n  WHEN waf_id = 'DG-01-05' THEN 50\n\n  WHEN waf_id = 'DG-02-01' THEN 100\n\n  WHEN waf_id = 'DG-02-02' THEN 100\n\n  WHEN waf_id = 'DG-02-03' THEN 100\n\n  WHEN waf_id = 'DG-03-02' THEN 100\n\n  WHEN waf_id = 'DG-03-03' THEN 80\n\n  END as threshold_percentage,\n\n  CASE \n\n  WHEN implemented = 'Yes' THEN 'Met'\n\n  ELSE 'Not Met'\n\n  END as threshold_met,\n\n  implemented\n\nFROM waf_status\n\nORDER BY principle, waf_id;\n"
  parameters: []
  pillar: governance
  table_name: waf_controls_g
  is_coming_soon: false
  is_control_query: true
- name: '95258030'
  display_name: waf_principal_percentage_g
  sql: "WITH delta_usage AS (\n\n  SELECT \n\n    COUNT(*) as total_tables,\n\n    SUM(CASE WHEN data_source_format IN ('DELTA', 'ICEBERG') THEN 1 ELSE 0 END) as delta_tables\n\n  FROM system.information_schema.tables\n\n  WHERE table_catalog != 'hive_metastore'\n\n),\n\nlineage_usage AS (\n\n  SELECT \n\n    COUNT(DISTINCT CONCAT(t.table_catalog, '.', t.table_schema, '.', t.table_name)) as total_tables,\n\n    COUNT(DISTINCT CASE WHEN tl.target_table_full_name IS NOT NULL THEN CONCAT(t.table_catalog, '.', t.table_schema, '.', t.table_name) END) as lineage_tables\n\n  FROM system.information_schema.tables t\n\n  LEFT JOIN system.access.table_lineage tl ON CONCAT(t.table_catalog, '.', t.table_schema, '.', t.table_name) = tl.target_table_full_name\n\n  WHERE t.table_catalog != 'hive_metastore'\n\n),\n\nmetadata_usage AS (\n\n  SELECT \n\n    COUNT(*) as total_tables,\n\n    SUM(CASE WHEN comment IS NOT NULL THEN 1 ELSE 0 END) as tables_with_comments,\n\n    CASE WHEN EXISTS (SELECT 1 FROM system.information_schema.table_tags LIMIT 1) \n\n      THEN (SELECT COUNT(*) FROM system.information_schema.tables WHERE table_catalog != 'hive_metastore')\n\n      ELSE 0 \n\n    END as tables_with_tags\n\n  FROM system.information_schema.tables t\n\n  WHERE table_catalog != 'hive_metastore'\n\n),\n\nwaf_status AS (\n\n  SELECT\n\n    waf_id,\n\n    principle,\n\n    CASE \n\n    WHEN waf_id = 'DG-01-03' AND (\n\n      SELECT CASE WHEN total_tables > 0 THEN (lineage_tables * 100.0 / total_tables) ELSE 0 END FROM lineage_usage\n\n    ) >= 50 THEN 'Yes'\n\n    WHEN waf_id = 'DG-01-04' AND (\n\n      SELECT CASE WHEN total_tables > 0 THEN (tables_with_comments * 100.0 / total_tables) ELSE 0 END FROM metadata_usage\n\n    ) >= 50 THEN 'Yes'\n\n    WHEN waf_id = 'DG-01-05' AND EXISTS (SELECT 1 FROM system.information_schema.table_tags LIMIT 1) THEN 'Yes'\n\n    WHEN waf_id = 'DG-02-01' AND EXISTS (SELECT 1 FROM system.information_schema.row_filters LIMIT 1) THEN 'Yes'\n\n    WHEN waf_id = 'DG-02-02' AND EXISTS (SELECT 1 FROM system.access.audit LIMIT 1) THEN 'Yes'\n\n    WHEN waf_id = 'DG-02-03' AND EXISTS (\n\n      SELECT 1 FROM system.information_schema.tables\n\n      WHERE table_catalog = 'system' AND table_schema = 'marketplace' AND table_name = 'listing_access_events'\n\n      LIMIT 1\n\n    ) THEN 'Yes'\n\n    WHEN waf_id = 'DG-03-02' AND EXISTS (\n\n      SELECT 1 FROM system.information_schema.tables \n\n      WHERE table_name LIKE '%_drift_metrics' OR table_name LIKE '%_profile_metrics' \n\n      LIMIT 1\n\n    ) THEN 'Yes'\n\n    WHEN waf_id = 'DG-03-03' AND (\n\n      SELECT CASE WHEN total_tables > 0 THEN (delta_tables * 100.0 / total_tables) ELSE 0 END FROM delta_usage\n\n    ) >= 80 THEN 'Yes'\n\n    ELSE 'No'\n\n    END AS implemented\n\n  FROM (\n\n    SELECT * FROM VALUES\n\n    ('DG-01-03', 'Unify data and AI management'),\n\n    ('DG-01-04', 'Unify data and AI management'),\n\n    ('DG-01-05', 'Unify data and AI management'),\n\n    ('DG-02-01', 'Unify data and AI security'),\n\n    ('DG-02-02', 'Unify data and AI security'),\n\n    ('DG-02-03', 'Unify data and AI security'),\n\n    ('DG-03-02', 'Establish data quality standards'),\n\n    ('DG-03-03', 'Establish data quality standards')\n\n    AS waf(waf_id, principle)\n\n  )\n\n)\n\nSELECT\n\n  principle,\n\n  COUNT(*) AS total_controls,\n\n  SUM(CASE WHEN implemented = 'Yes' THEN 1 ELSE 0 END) AS implemented_controls,\n\n  ROUND(100 * SUM(CASE WHEN implemented = 'Yes' THEN 1 ELSE 0 END) / COUNT(*), 0) AS completion_percent\n\nFROM waf_status\n\nGROUP BY principle\n\nORDER BY principle;\n"
  parameters: []
  pillar: governance
  table_name: waf_principal_percentage_g
  is_coming_soon: false
- name: 920a8759
  display_name: total_percentage_g
  sql: "WITH delta_usage AS (\n\n  SELECT \n\n    COUNT(*) as total_tables,\n\n    SUM(CASE WHEN data_source_format IN ('DELTA', 'ICEBERG') THEN 1 ELSE 0 END) as delta_tables\n\n  FROM system.information_schema.tables\n\n  WHERE table_catalog != 'hive_metastore'\n\n),\n\nlineage_usage AS (\n\n  SELECT \n\n    COUNT(DISTINCT CONCAT(t.table_catalog, '.', t.table_schema, '.', t.table_name)) as total_tables,\n\n    COUNT(DISTINCT CASE WHEN tl.target_table_full_name IS NOT NULL THEN CONCAT(t.table_catalog, '.', t.table_schema, '.', t.table_name) END) as lineage_tables\n\n  FROM system.information_schema.tables t\n\n  LEFT JOIN system.access.table_lineage tl ON CONCAT(t.table_catalog, '.', t.table_schema, '.', t.table_name) = tl.target_table_full_name\n\n  WHERE t.table_catalog != 'hive_metastore'\n\n),\n\nmetadata_usage AS (\n\n  SELECT \n\n    COUNT(*) as total_tables,\n\n    SUM(CASE WHEN comment IS NOT NULL THEN 1 ELSE 0 END) as tables_with_comments,\n\n    CASE WHEN EXISTS (SELECT 1 FROM system.information_schema.table_tags LIMIT 1) \n\n      THEN (SELECT COUNT(*) FROM system.information_schema.tables WHERE table_catalog != 'hive_metastore')\n\n      ELSE 0 \n\n    END as tables_with_tags\n\n  FROM system.information_schema.tables t\n\n  WHERE table_catalog != 'hive_metastore'\n\n),\n\nwaf_status AS (\n\n  SELECT\n\n    waf_id,\n\n    CASE \n\n    -- DG-01-03: >50% of tables have lineage tracked\n\n    WHEN waf_id = 'DG-01-03' AND (\n\n      SELECT CASE WHEN total_tables > 0 THEN (lineage_tables * 100.0 / total_tables) ELSE 0 END FROM lineage_usage\n\n    ) >= 50 THEN 'Yes'\n\n    -- DG-01-04: >50% of tables have comments\n\n    WHEN waf_id = 'DG-01-04' AND (\n\n      SELECT CASE WHEN total_tables > 0 THEN (tables_with_comments * 100.0 / total_tables) ELSE 0 END FROM metadata_usage\n\n    ) >= 50 THEN 'Yes'\n\n    -- DG-01-05: >50% of tables have tags\n\n    WHEN waf_id = 'DG-01-05' AND EXISTS (SELECT 1 FROM system.information_schema.table_tags LIMIT 1) THEN 'Yes'\n\n    -- DG-02-01: Row filters exist\n\n    WHEN waf_id = 'DG-02-01' AND EXISTS (\n\n      SELECT 1 FROM system.information_schema.row_filters LIMIT 1\n\n    ) THEN 'Yes'\n\n    -- DG-02-02: Audit logging exists\n\n    WHEN waf_id = 'DG-02-02' AND EXISTS (\n\n      SELECT 1 FROM system.access.audit LIMIT 1\n\n    ) THEN 'Yes'\n\n    -- DG-02-03: Marketplace audit events exist\n\n    WHEN waf_id = 'DG-02-03' AND EXISTS (\n\n      SELECT 1 FROM system.information_schema.tables\n\n      WHERE table_catalog = 'system' AND table_schema = 'marketplace' AND table_name = 'listing_access_events'\n\n      LIMIT 1\n\n    ) THEN 'Yes'\n\n    -- DG-03-02: Data quality tools exist\n\n    WHEN waf_id = 'DG-03-02' AND EXISTS (\n\n      SELECT 1 FROM system.information_schema.tables \n\n      WHERE table_name LIKE '%_drift_metrics' OR table_name LIKE '%_profile_metrics' \n\n      LIMIT 1\n\n    ) THEN 'Yes'\n\n    -- DG-03-03: >80% of tables use Delta/ICEBERG format\n\n    WHEN waf_id = 'DG-03-03' AND (\n\n      SELECT CASE WHEN total_tables > 0 THEN (delta_tables * 100.0 / total_tables) ELSE 0 END FROM delta_usage\n\n    ) >= 80 THEN 'Yes'\n\n    ELSE 'No'\n\n    END AS implemented\n\n  FROM (\n\n    SELECT * FROM VALUES\n\n    ('DG-01-03'), ('DG-01-04'), ('DG-01-05'),\n\n    ('DG-02-01'), ('DG-02-02'), ('DG-02-03'),\n\n    ('DG-03-02'), ('DG-03-03')\n\n    AS waf(waf_id)\n\n  )\n\n)\n\nSELECT\n\n  COUNT(*) AS total_controls,\n\n  SUM(CASE WHEN implemented = 'Yes' THEN 1 ELSE 0 END) AS implemented_controls,\n\n  ROUND(100 * SUM(CASE WHEN implemented = 'Yes' THEN 1 ELSE 0 END) / COUNT(*), 0) AS completion_percent\n\nFROM waf_status;\n"
  parameters: []
  pillar: governance
  table_name: waf_total_percentage_g
  is_coming_soon: false
- name: b39d7f91
  display_name: total_percentage_across_pillars
  sql: "WITH delta_usage AS (\n\n  SELECT \n\n    COUNT(*) as total_tables,\n\n    SUM(CASE WHEN data_source_format IN ('DELTA', 'ICEBERG') THEN 1 ELSE 0 END) as delta_tables\n\n  FROM system.information_schema.tables\n\n  WHERE table_catalog != 'hive_metastore'\n\n),\n\nmanaged_usage AS (\n\n  SELECT \n\n    TRY_DIVIDE(\n      100.0 * SUM(CASE WHEN table_type = 'MANAGED' THEN 1 ELSE 0 END),\n      SUM(CASE WHEN table_type IN ('MANAGED', 'EXTERNAL') THEN 1 ELSE 0 END)\n    ) AS managed_percentage\n\n  FROM system.information_schema.tables\n\n  WHERE table_catalog != 'hive_metastore'\n\n),\n\nlineage_usage AS (\n\n  SELECT \n\n    COUNT(DISTINCT CONCAT(t.table_catalog, '.', t.table_schema, '.', t.table_name)) as total_tables,\n\n    COUNT(DISTINCT CASE WHEN tl.target_table_full_name IS NOT NULL THEN CONCAT(t.table_catalog, '.', t.table_schema, '.', t.table_name) END) as lineage_tables\n\n  FROM system.information_schema.tables t\n\n  LEFT JOIN system.access.table_lineage tl ON CONCAT(t.table_catalog, '.', t.table_schema, '.', t.table_name) = tl.target_table_full_name\n\n  WHERE t.table_catalog != 'hive_metastore'\n\n),\n\nmetadata_usage AS (\n\n  SELECT \n\n    COUNT(*) as total_tables,\n\n    SUM(CASE WHEN comment IS NOT NULL THEN 1 ELSE 0 END) as tables_with_comments,\n\n    CASE WHEN EXISTS (SELECT 1 FROM system.information_schema.table_tags LIMIT 1) \n\n      THEN (SELECT COUNT(*) FROM system.information_schema.tables WHERE table_catalog != 'hive_metastore')\n\n      ELSE 0 \n\n    END as tables_with_tags\n\n  FROM system.information_schema.tables t\n\n  WHERE table_catalog != 'hive_metastore'\n\n),\n\nserverless_usage AS (\n\n  SELECT \n\n    COUNT(*) as total_compute,\n\n    SUM(CASE WHEN usage_type LIKE '%SERVERLESS%' OR sku_name LIKE '%SERVERLESS%' THEN 1 ELSE 0 END) as serverless_count\n\n  FROM system.billing.usage\n\n  WHERE usage_start_time >= CURRENT_DATE - INTERVAL '30' DAY\n\n    AND usage_type LIKE '%COMPUTE%'\n\n),\n\nphoton_usage AS (\n\n  SELECT \n\n    COUNT(*) as total_compute,\n\n    SUM(CASE WHEN product_features.is_photon = true THEN 1 ELSE 0 END) as photon_compute\n\n  FROM system.billing.usage\n\n  WHERE usage_start_time >= CURRENT_DATE - INTERVAL '30' DAY\n\n    AND usage_type LIKE '%COMPUTE%'\n\n),\n\nsql_warehouse_usage AS (\n\n  SELECT\n\n    COUNT(*) as total_compute,\n\n    SUM(CASE WHEN compute.type = 'WAREHOUSE' THEN 1 ELSE 0 END) as sql_compute\n\n  FROM system.query.history\n\n  WHERE start_time >= current_timestamp() - INTERVAL 30 DAYS\n\n),\n\ncluster_policies AS (\n\n  SELECT \n\n    COUNT(*) as total_clusters,\n\n    SUM(CASE WHEN policy_id IS NOT NULL THEN 1 ELSE 0 END) as clusters_with_policy\n\n  FROM system.compute.clusters\n\n),\n\ncluster_tags AS (\n\n  SELECT \n\n    COUNT(*) as total_clusters,\n\n    SUM(CASE WHEN size(map_keys(tags)) > 0 THEN 1 ELSE 0 END) as clusters_with_tags\n\n  FROM system.compute.clusters\n\n),\n\ncluster_workers AS (\n\n  SELECT \n\n    COUNT(*) as total_clusters,\n\n    SUM(CASE WHEN worker_count > 1 THEN 1 ELSE 0 END) as clusters_multi_worker,\n\n    SUM(CASE WHEN worker_count > 3 THEN 1 ELSE 0 END) as clusters_large\n\n  FROM system.compute.clusters\n\n),\n\ninstance_variety AS (\n\n  SELECT \n\n    COUNT(*) as total_clusters,\n\n    COUNT(DISTINCT split(worker_node_type,'[.]')[0]) as distinct_families\n\n  FROM system.compute.clusters\n\n),\n\ndlt_usage AS (\n\n  SELECT \n\n    COUNT(*) as total_compute_usage,\n\n    SUM(CASE WHEN billing_origin_product = 'DLT' THEN 1 ELSE 0 END) as dlt_compute_usage\n\n  FROM system.billing.usage\n\n  WHERE usage_start_time >= CURRENT_DATE - INTERVAL '30' DAY\n\n    AND usage_type LIKE '%COMPUTE%'\n\n),\n\nmodel_serving_usage AS (\n\n  SELECT \n\n    COUNT(*) as total_ml_compute,\n\n    SUM(CASE WHEN billing_origin_product = 'MODEL_SERVING' THEN 1 ELSE 0 END) as serving_compute\n\n  FROM system.billing.usage\n\n  WHERE usage_start_time >= CURRENT_DATE - INTERVAL '30' DAY\n\n    AND (usage_type LIKE '%COMPUTE%' OR billing_origin_product = 'MODEL_SERVING')\n\n),\n\nautoscale_clusters AS (\n\n  SELECT \n\n    COUNT(*) as total_clusters,\n\n    SUM(CASE WHEN ifnull(max_autoscale_Workers, 0) > 0 THEN 1 ELSE 0 END) as autoscale_clusters\n\n  FROM system.compute.clusters\n\n),\n\nautoscale_warehouses AS (\n\n  SELECT \n\n    COUNT(*) as total_warehouses,\n\n    SUM(CASE WHEN max_clusters - min_clusters > 0 THEN 1 ELSE 0 END) as autoscale_warehouses\n\n  FROM system.compute.warehouses\n\n),\n\nwaf_status AS (\n\n  SELECT\n\n    waf_id,\n\n    CASE \n\n    -- Governance (DG)\n\n    WHEN waf_id = 'DG-01-03' AND (\n\n      SELECT CASE WHEN total_tables > 0 THEN (lineage_tables * 100.0 / total_tables) ELSE 0 END FROM lineage_usage\n\n    ) >= 50 THEN 'Yes'\n\n    WHEN waf_id = 'DG-01-04' AND (\n\n      SELECT CASE WHEN total_tables > 0 THEN (tables_with_comments * 100.0 / total_tables) ELSE 0 END FROM metadata_usage\n\n    ) >= 50 THEN 'Yes'\n\n    WHEN waf_id = 'DG-01-05' AND EXISTS (SELECT 1 FROM system.information_schema.table_tags LIMIT 1) THEN 'Yes'\n\n    WHEN waf_id = 'DG-02-01' AND EXISTS (SELECT 1 FROM system.information_schema.row_filters LIMIT 1) THEN 'Yes'\n\n    WHEN waf_id = 'DG-02-02' AND EXISTS (SELECT 1 FROM system.access.audit LIMIT 1) THEN 'Yes'\n\n    WHEN waf_id = 'DG-02-03' AND EXISTS (\n\n      SELECT 1 FROM system.information_schema.tables\n\n      WHERE table_catalog = 'system' AND table_schema = 'marketplace' AND table_name = 'listing_access_events'\n\n      LIMIT 1\n\n    ) THEN 'Yes'\n\n    WHEN waf_id = 'DG-03-02' AND EXISTS (\n\n      SELECT 1 FROM system.information_schema.tables \n\n      WHERE table_name LIKE '%_drift_metrics' OR table_name LIKE '%_profile_metrics' \n\n      LIMIT 1\n\n    ) THEN 'Yes'\n\n    WHEN waf_id = 'DG-03-03' AND (\n\n      SELECT CASE WHEN total_tables > 0 THEN (delta_tables * 100.0 / total_tables) ELSE 0 END FROM delta_usage\n\n    ) >= 80 THEN 'Yes'\n\n    -- Cost (CO)\n\n    WHEN waf_id = 'CO-01-01' AND (\n\n      SELECT managed_percentage FROM managed_usage\n\n    ) >= 80 THEN 'Yes'\n\n    WHEN waf_id = 'CO-01-03' AND (\n\n      SELECT CASE WHEN total_compute > 0 THEN (sql_compute * 100.0 / total_compute) ELSE 0 END FROM sql_warehouse_usage\n\n    ) >= 50 THEN 'Yes'\n\n    WHEN waf_id = 'CO-01-04' AND EXISTS (SELECT 1 FROM system.compute.clusters WHERE dbr_version IS NOT NULL LIMIT 1) THEN 'Yes'\n\n    WHEN waf_id = 'CO-01-06' AND (\n\n      SELECT CASE WHEN total_compute > 0 THEN (serverless_count * 100.0 / total_compute) ELSE 0 END FROM serverless_usage\n\n    ) >= 50 THEN 'Yes'\n\n    WHEN waf_id = 'CO-01-09' AND (\n\n      SELECT CASE WHEN total_compute > 0 THEN (photon_compute * 100.0 / total_compute) ELSE 0 END FROM photon_usage\n\n    ) >= 80 THEN 'Yes'\n\n    WHEN waf_id = 'CO-02-03' AND (\n\n      SELECT CASE WHEN total_clusters > 0 THEN (clusters_with_policy * 100.0 / total_clusters) ELSE 0 END FROM cluster_policies\n\n    ) >= 80 THEN 'Yes'\n\n    WHEN waf_id = 'CO-03-01' AND EXISTS (SELECT 1 FROM system.billing.usage LIMIT 1) THEN 'Yes'\n\n    WHEN waf_id = 'CO-03-02' AND (\n\n      SELECT CASE WHEN total_clusters > 0 THEN (clusters_with_tags * 100.0 / total_clusters) ELSE 0 END FROM cluster_tags\n\n    ) >= 80 THEN 'Yes'\n\n    WHEN waf_id = 'CO-03-03' AND EXISTS (SELECT 1 FROM system.billing.usage LIMIT 1) THEN 'Yes'\n\n    -- Performance (PE)\n\n    WHEN waf_id = 'PE-01-01' AND (\n\n      SELECT CASE WHEN total_compute > 0 THEN (serverless_count * 100.0 / total_compute) ELSE 0 END FROM serverless_usage\n\n    ) >= 50 THEN 'Yes'\n\n    WHEN waf_id = 'PE-01-02' AND EXISTS (\n\n      SELECT 1 FROM system.billing.usage WHERE sku_name LIKE '%SERVERLESS_REAL_TIME_INFERENCE%' LIMIT 1\n\n    ) THEN 'Yes'\n\n    WHEN waf_id = 'PE-02-02' AND (\n\n      SELECT CASE WHEN total_clusters > 0 THEN (clusters_multi_worker * 100.0 / total_clusters) ELSE 0 END FROM cluster_workers\n\n    ) >= 80 THEN 'Yes'\n\n    WHEN waf_id = 'PE-02-04' AND (\n\n      SELECT CASE WHEN total_clusters > 0 THEN (clusters_large * 100.0 / total_clusters) ELSE 0 END FROM cluster_workers\n\n    ) >= 50 THEN 'Yes'\n\n    WHEN waf_id = 'PE-02-05' AND NOT EXISTS (\n\n      SELECT 1 FROM system.information_schema.routines WHERE external_language = 'Python' LIMIT 1\n\n    ) THEN 'Yes'\n\n    WHEN waf_id = 'PE-02-06' AND (\n\n      SELECT CASE WHEN total_compute > 0 THEN (photon_compute * 100.0 / total_compute) ELSE 0 END FROM photon_usage\n\n    ) >= 80 THEN 'Yes'\n\n    WHEN waf_id = 'PE-02-07' AND (\n\n      SELECT CASE WHEN total_clusters > 0 THEN (distinct_families * 100.0 / total_clusters) ELSE 0 END FROM instance_variety\n\n    ) >= 5 THEN 'Yes'\n\n    -- Reliability (R)\n\n    WHEN waf_id = 'R-01-01' AND (\n\n      SELECT CASE WHEN total_tables > 0 THEN (delta_tables * 100.0 / total_tables) ELSE 0 END FROM delta_usage\n\n    ) >= 80 THEN 'Yes'\n\n    WHEN waf_id = 'R-01-03' AND (\n\n      SELECT CASE WHEN total_compute_usage > 0 THEN (dlt_compute_usage * 100.0 / total_compute_usage) ELSE 0 END FROM dlt_usage\n\n    ) >= 30 THEN 'Yes'\n\n    WHEN waf_id = 'R-01-05' AND (\n\n      SELECT CASE WHEN total_ml_compute > 0 THEN (serving_compute * 100.0 / total_ml_compute) ELSE 0 END FROM model_serving_usage\n\n    ) >= 20 THEN 'Yes'\n\n    WHEN waf_id = 'R-01-06' AND (\n\n      SELECT CASE WHEN total_compute > 0 THEN (serverless_count * 100.0 / total_compute) ELSE 0 END FROM serverless_usage\n\n    ) >= 50 THEN 'Yes'\n\n    WHEN waf_id = 'R-02-03' AND EXISTS (SELECT 1 FROM system.information_schema.metastores LIMIT 1) THEN 'Yes'\n\n    WHEN waf_id = 'R-02-04' AND (\n\n      SELECT CASE WHEN total_compute_usage > 0 THEN (dlt_compute_usage * 100.0 / total_compute_usage) ELSE 0 END FROM dlt_usage\n\n    ) >= 30 THEN 'Yes'\n\n    WHEN waf_id = 'R-03-01' AND (\n\n      SELECT CASE WHEN total_clusters > 0 THEN (autoscale_clusters * 100.0 / total_clusters) ELSE 0 END FROM autoscale_clusters\n\n    ) >= 80 THEN 'Yes'\n\n    WHEN waf_id = 'R-03-02' AND (\n\
    \n      SELECT CASE WHEN total_warehouses > 0 THEN (autoscale_warehouses * 100.0 / total_warehouses) ELSE 0 END FROM autoscale_warehouses\n\n    ) >= 80 THEN 'Yes'\n\n    ELSE 'No'\n\n    END AS implemented,\n\n    CASE \n\n    WHEN waf_id LIKE 'DG-%' THEN 'Data & AI Governance'\n\n    WHEN waf_id LIKE 'CO-%' THEN 'Cost Optimization'\n\n    WHEN waf_id LIKE 'PE-%' THEN 'Performance Efficiency'\n\n    WHEN waf_id LIKE 'R-%'  THEN 'Reliability'\n\n    END AS pillar\n\n  FROM (\n\n    SELECT * FROM VALUES\n\n    ('DG-01-03'), ('DG-01-04'), ('DG-01-05'),\n\n    ('DG-02-01'), ('DG-02-02'), ('DG-02-03'),\n\n    ('DG-03-02'), ('DG-03-03'),\n\n    ('CO-01-01'), ('CO-01-03'), ('CO-01-04'), ('CO-01-06'), ('CO-01-09'),\n\n    ('CO-02-03'), ('CO-03-01'), ('CO-03-02'), ('CO-03-03'),\n\n    ('PE-01-01'), ('PE-01-02'),\n\n    ('PE-02-02'), ('PE-02-04'), ('PE-02-05'), ('PE-02-06'), ('PE-02-07'),\n\n    ('R-01-01'), ('R-01-03'), ('R-01-05'), ('R-01-06'),\n\n    ('R-02-03'), ('R-02-04'),\n\n    ('R-03-01'), ('R-03-02')\n\n    AS waf(waf_id)\n\n  )\n\n)\n\nSELECT\n\n  pillar,\n\n  COUNT(*) AS total_controls,\n\n  SUM(CASE WHEN implemented = 'Yes' THEN 1 ELSE 0 END) AS implemented_controls,\n\n  ROUND(100 * SUM(CASE WHEN implemented = 'Yes' THEN 1 ELSE 0 END) / COUNT(*), 0) AS completion_percent\n\nFROM waf_status\n\nGROUP BY pillar\n\nORDER BY pillar;\n"
  parameters: []
  pillar: summary
  table_name: waf_total_percentage_across_pillars
  is_coming_soon: false
