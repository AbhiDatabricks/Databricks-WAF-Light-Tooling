- name: fbc6ed5e
  display_name: waf_CO-02-01_AP_auto_scaling
  sql: "select workspace_id,cluster_id,cluster_name\n\n, max_autoscale_workers\n\n,case when max_autoscale_workers is null then \"Autoscaling Disabled\" else \"Autoscaling Enabled\" end as autoscaling_enabled\n\nfrom system.compute.clusters\n\nqualify\n\nROW_NUMBER() OVER (PARTITION BY account_id, workspace_id, cluster_id ORDER BY change_time DESC) = 1\n\nand delete_time is null \n\n--  AND array_contains(:workspace_id,workspace_id)\n\nand cluster_source in (\"API\", \"UI\")"
  parameters:
  - workspace_id
  pillar: cost_optimisation
  table_name: waf_co_02_01_ap_auto_scaling
  is_coming_soon: false
- name: 4858cc4e
  display_name: waf_CO-02-01_warehouse_auto_scaling
  sql: "SELECT\n\n    warehouse_id,\n\n    warehouse_name,\n\n    warehouse_type,\n\n    warehouse_size,\n\n    min_clusters,\n\n    max_clusters,\n\n    case when max_clusters > min_clusters then 'Yes' else 'No' end as autoscaling_enabled\n\nFROM\n\n    system.compute.warehouses\n\nQUALIFY\n\n    ROW_NUMBER() OVER (PARTITION BY account_id, workspace_id, warehouse_id ORDER BY change_time DESC) = 1\n\n    and delete_time is null\n\n    -- AND array_contains(:workspace_id,workspace_id)"
  parameters:
  - workspace_id
  pillar: cost_optimisation
  table_name: waf_co_02_01_warehouse_auto_scaling
  is_coming_soon: false
- name: 809dc7c9
  display_name: waf_CO-02-01_jobs_auto_scaling
  sql: "select workspace_id,cluster_id,cluster_name\n\n, max_autoscale_workers\n\n,case when max_autoscale_workers is null then \"No\" else \"Yes\" end as autoscaling_enabled\n\nfrom system.compute.clusters\n\nqualify\n\nROW_NUMBER() OVER (PARTITION BY account_id, workspace_id, cluster_id ORDER BY change_time DESC) = 1\n\nand delete_time is null \n\nand cluster_source in (\"JOB\")\n\n--  AND array_contains(:workspace_id,workspace_id)\n"
  parameters:
  - workspace_id
  pillar: cost_optimisation
  table_name: waf_co_02_01_jobs_auto_scaling
  is_coming_soon: false
