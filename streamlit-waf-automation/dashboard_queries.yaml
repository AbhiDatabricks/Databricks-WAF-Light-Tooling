- name: waf_co_01_02_ba132837
  display_name: 'CO-01-02: Job vs All-Purpose Cluster Usage'
  sql: "SELECT\n  CASE\n    WHEN sku_name LIKE '%JOBS%' OR sku_name LIKE '%JOB%' THEN 'Job Clusters (Cost Effective)'\n    WHEN sku_name LIKE '%ALL_PURPOSE%' OR sku_name LIKE '%ALL PURPOSE%' THEN 'All-Purpose (Expensive)'\n    ELSE 'Other'\n  END AS cluster_category,\n  COUNT(*) AS usage_count,\n  ROUND(SUM(usage_quantity), 2) AS total_dbus\nFROM system.billing.usage\nWHERE usage_date >= CURRENT_DATE - INTERVAL '30' DAY\n  AND usage_type LIKE '%COMPUTE%'\nGROUP BY cluster_category\nORDER BY total_dbus DESC"
